<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
    {{ with .Title }} {{.}} &mdash; {{end}} {{ .Site.Title }}
</title>

<!-- theme meta -->
<meta name="author" content="M Inam (https://www.linkedin.com/in/iaminamcom/)">

{{ with .Params.keywords }}
<meta name="keywords" content="{{ delimit . `,` }}">
{{ end }}

{{ with .Params.description }}
<meta name="description" content="{{ . }}">
{{ end }}

{{ partial "opengraph.html" . }}
{{ partial "twitter_cards.html" . }}
{{ partial "schema.html" . }}

<!-- favicon -->
<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
<link rel="shortcut icon" href="/favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="{{.LinkTitle }}" />
<link rel="manifest" href="/favicon/site.webmanifest" />
<meta name="theme-color" content="#036">

{{ with .Params.hide_seo }}
<meta name="robots" content="noindex">
<meta name="robots" content="noindex, nofollow">
{{ end }}

<link rel="canonical" href="{{ .Permalink }}" />

<!-- CSS
    ================================================== -->
<link rel="stylesheet" href="/css/vendor.css">
<link rel="stylesheet" href="/css/styles.css">

<script>
    document.documentElement.classList.remove('no-js');
    document.documentElement.classList.add('js');
</script>
